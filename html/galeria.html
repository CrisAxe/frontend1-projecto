<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria – Casa Pituxa</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/hero.css">
    <link rel="stylesheet" href="../css/sobre.css">
    <link rel="stylesheet" href="../css/menu.css">
    <link rel="stylesheet" href="../css/contactos.css">
    <link rel="stylesheet" href="../css/reservas.css">
    <link rel="stylesheet" href="../css/reviews.css">
    <link rel="stylesheet" href="../css/info-section.css">
    <link rel="stylesheet" href="../css/galeria.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

<header class="navbar">
    <div class="brand">
        <a href="../index.html">
            <img src="../pics/LOGO B.png" alt="Logo Casa Pituxa">
        </a>
    </div>

    
    <button class="hamburger" id="hamburger" aria-label="Abrir menu de navegação">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <nav class="main-nav" id="main-nav">
        <ul>
            <li><a class="btn-menu" href="menu.html">Menu</a></li>
            <li><a class="btn-galeria" href="galeria.html">Galeria</a></li>
            <li><a class="btn-contactos" href="contactos.html">Contactos</a></li>
            <li><a class="btn-reserva" href="reservas.html">Reservar</a></li>
        </ul>
    </nav>
</header>

    <section class="galeria-section">
        <h2 class="galeria-title">Galeria Casa Pituxa</h2>
        <p class="galeria-subtitle">Explore o ambiente, os pratos e a essência da nossa casa.</p>

        <div class="galeria-grid">
            <div class="galeria-item">
                <img src="../pics/entrance.jpg" alt="Entrada da Casa Pituxa">
            </div>
            <div class="galeria-item">
                <img src="../pics/outdoor.jpg" alt="Esplanada exterior">
            </div>
            <div class="galeria-item">
                <img src="../pics/bar.jpg" alt="Bar do restaurante">
            </div>
            <div class="galeria-item">
                <img src="../pics/deck.jpg" alt="Zona de deck exterior">
            </div>
            <div class="galeria-item">
                <img src="../pics/we-made-some-deliciou.jpg" alt="Sobremesa da Casa Pituxa">
            </div>
            <div class="galeria-item">
                <img src="../pics/join-us-for-dinner-tonight (1).jpg" alt="Menu português">
            </div>
            <div class="galeria-item">
                <img src="../pics/join-us-for-dinner-tonight.jpg" alt="Menu inglês">
            </div>
            <div class="galeria-item">
                <img src="../pics/stjack.jpg" alt="Prato especial Casa Pituxa">
            </div>
        </div>
    </section>

    <section class="canvas-section">
        <div class="canvas-container">
            <h2 class="canvas-title">Deixe a sua marca</h2>
            <p class="canvas-subtitle">Desenhe ou assine como recordação da sua visita.</p>

            <div class="canvas-box">
                <canvas id="pituxa-canvas" width="500" height="280"></canvas>
            </div>

            <button id="clear-canvas" class="canvas-btn">Limpar</button>
        </div>
    </section>


    <footer class="site-footer">
        <p>Casa Pituxa &copy; <span id="current-year"></span></p>
        <p class="footer-time">Agora: <span id="current-time"></span></p>
    </footer>

    <script src="../js/canvas.js"></script>
    <script src="../js/datetime.js"></script>
    <script src="../js/navbar.js"></script>
    <script>
        document.querySelectorAll(".galeria-item img").forEach(img => {
            img.addEventListener("click", () => {
                const lightbox = document.createElement("div");
                lightbox.classList.add("lightbox");
                lightbox.innerHTML = `<img src="${img.src}" alt="${img.alt}">`;
                document.body.appendChild(lightbox);

                setTimeout(() => lightbox.classList.add("active"), 10);

                lightbox.addEventListener("click", () => {
                    lightbox.classList.remove("active");
                    setTimeout(() => lightbox.remove(), 300);
                });
            });
        });
    </script>

</body>

</html>
