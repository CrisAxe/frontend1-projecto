<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu – Casa Pituxa</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/hero.css">
    <link rel="stylesheet" href="../css/sobre.css">
    <link rel="stylesheet" href="../css/menu.css">
    <link rel="stylesheet" href="../css/contactos.css">
    <link rel="stylesheet" href="../css/reservas.css">
    <link rel="stylesheet" href="../css/reviews.css">
    <link rel="stylesheet" href="../css/info-section.css">


    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

<header class="navbar">
    <div class="brand">
        <a href="../index.html">
            <img src="../pics/LOGO B.png" alt="Logo Casa Pituxa">
        </a>
    </div>

    
    <button class="hamburger" id="hamburger" aria-label="Abrir menu de navegação">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <nav class="main-nav" id="main-nav">
        <ul>
            <li><a class="btn-menu" href="menu.html">Menu</a></li>
            <li><a class="btn-galeria" href="galeria.html">Galeria</a></li>
            <li><a class="btn-contactos" href="contactos.html">Contactos</a></li>
            <li><a class="btn-reserva" href="reservas.html">Reservar</a></li>
        </ul>
    </nav>
</header>

    <section class="menu-section">
        <h2 class="menu-title">Menu Português</h2>

        <div class="menu-grid">
            <div class="menu-item">
                <img src="../pics/menu1pt.jpeg" alt="Menu Português - Página 1">
            </div>
            <div class="menu-item">
                <img src="../pics/menu2pt.jpeg" alt="Menu Português - Página 2">
            </div>
            <div class="menu-item">
                <img src="../pics/menu3pt.jpeg" alt="Menu Português - Página 3">
            </div>
        </div>
    </section>

    <section class="menu-section">
        <h2 class="menu-title">Menu Inglês</h2>

        <div class="menu-grid">
            <div class="menu-item">
                <img src="../pics/menu1uk.jpeg" alt="Menu Inglês - Página 1">
            </div>
            <div class="menu-item">
                <img src="../pics/menu2uk.jpeg" alt="Menu Inglês - Página 2">
            </div>
            <div class="menu-item">
                <img src="../pics/menu3uk.jpeg" alt="Menu Inglês - Página 3">
            </div>
        </div>
    </section>

    <section class="menu-section">
        <h2 class="menu-title">Vinhos</h2>

        <div class="menu-grid">
            <div class="menu-item">
                <img src="../pics/winered.jpeg" alt="Vinho Tinto">
            </div>
            <div class="menu-item">
                <img src="../pics/winewhite.jpeg" alt="Vinho Branco">
            </div>
        </div>
    </section>

    <section class="menu-section">
        <h2 class="menu-title">Sobremesas</h2>

        <div class="menu-grid">
            <div class="menu-item">
                <img src="../pics/desert.jpeg" alt="Sobremesa da Casa Pituxa">
            </div>
            <div class="menu-item">
                <img src="../pics/desertwine.jpeg" alt="Sobremesa deliciosa">
            </div>
        </div>
    </section>


    <footer class="site-footer">
        <p>Casa Pituxa &copy; <span id="current-year"></span></p>
        <p class="footer-time">Agora: <span id="current-time"></span></p>
    </footer>

    <script src="../js/navbar.js"></script>
    <script src="../js/datetime.js"></script>
    <script>
        document.querySelectorAll(".menu-item img").forEach(img => {
            img.addEventListener("click", () => {
                const lightbox = document.createElement("div");
                lightbox.classList.add("lightbox");
                lightbox.innerHTML = `<img src="${img.src}" alt="${img.alt}">`;
                document.body.appendChild(lightbox);

                setTimeout(() => lightbox.classList.add("active"), 10);

                lightbox.addEventListener("click", () => {
                    lightbox.classList.remove("active");
                    setTimeout(() => lightbox.remove(), 300);
                });
            });
        });
    </script>

</body>

</html>
