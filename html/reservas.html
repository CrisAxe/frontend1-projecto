<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas – Casa Pituxa</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/hero.css">
    <link rel="stylesheet" href="../css/sobre.css">
    <link rel="stylesheet" href="../css/menu.css">
    <link rel="stylesheet" href="../css/contactos.css">
    <link rel="stylesheet" href="../css/reservas.css">
    <link rel="stylesheet" href="../css/reviews.css">
    <link rel="stylesheet" href="../css/info-section.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

<header class="navbar">
    <div class="brand">
        <a href="../index.html">
            <img src="../pics/LOGO B.png" alt="Logo Casa Pituxa">
        </a>
    </div>

    <button class="hamburger" id="hamburger" aria-label="Abrir menu de navegação">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <nav class="main-nav" id="main-nav">
        <ul>
            <li><a class="btn-menu" href="menu.html">Menu</a></li>
            <li><a class="btn-galeria" href="galeria.html">Galeria</a></li>
            <li><a class="btn-contactos" href="contactos.html">Contactos</a></li>
            <li><a class="btn-reserva" href="reservas.html">Reservar</a></li>
        </ul>
    </nav>
</header>

<reserva-alert mensagem="Por favor chegue 10 minutos antes da hora marcada."></reserva-alert>

<section id="reservas" class="reserva-section reveal-zoom">
    <h2 class="reserva-title">Reservar</h2>

    <form class="reserva-form">
        <div class="input-group">
            <label>Nome</label>
            <input type="text" name="nome" placeholder="O seu nome" required>
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="exemplo@gmail.com" required>
        </div>

        <div class="input-group">
            <label>Telefone</label>
            <input type="tel" name="telefone" placeholder="912 345 678" required>
        </div>

        <div class="input-row">
            <div class="input-group">
                <label>Data</label>
                <input type="date" name="data" id="data" required>
            </div>

            <div class="input-group">
                <label>Hora</label>
                <select name="hora" id="hora-select" required>
                    <option value="">Escolha a hora</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label>Número de Pessoas</label>
            <input type="number" name="pessoas" min="1" max="250" placeholder="2" required>
        </div>

        <div class="input-group">
            <label>Observações</label>
            <textarea name="obs" placeholder="Alguma preferência?"></textarea>
        </div>

        <button type="submit" class="btn-reservar">Confirmar Reserva</button>
    </form>
</section>

<section class="reservas-list-section reveal-zoom">
    <h2 class="reserva-title">Reservas registadas</h2>
    <table class="reservas-table">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Data</th>
                <th>Hora</th>
                <th>Pessoas</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="reservas-tbody"></tbody>
    </table>
</section>

<pituxa-footer></pituxa-footer>

<script src="../js/pituxa-footer.js"></script>
<script src="../js/reserva-alert.js"></script>
<script src="../js/datetime.js"></script>
<script src="https://unpkg.com/scrollreveal"></script>
<script src="../js/scroll.js"></script>
<script src="../js/reservation.js"></script>
<script src="../js/reviews.js"></script>
<script src="../js/navbar.js"></script>

</body>
</html>
